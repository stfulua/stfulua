name: Rotate Quote

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours, change this freely
  workflow_dispatch:

jobs:
  update-quote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Pick and inject quote
        run: |
          QUOTES=(
            "There is no answer better than silence, and there is no punishment worse than forgiveness."
            "A quiet man is terrifying to those who live in noise."
            "I will not be reformed by those who broke me. That is what it means to be Incorrigible."
            "The right person won't need you to explain your silence. They will sit beside it."
            "If you want to understand me, read the silence, not the storm."
          )

          RANDOM_QUOTE="${QUOTES[$RANDOM % ${#QUOTES[@]}]}"

          BLOCK="<!-- QUOTE_START -->\n<p align=\"center\"><i>\"${RANDOM_QUOTE}\"</i></p>\n<!-- QUOTE_END -->"

          perl -i -0pe "s|<!-- QUOTE_START -->.*?<!-- QUOTE_END -->|${BLOCK}|s" README.md

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: rotate quote"
          git push
